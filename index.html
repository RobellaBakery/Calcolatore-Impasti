<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricettario Robella Bakery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── RESET & VARIABILI ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream:   #f9f4ec;
            --warm:    #f0e6d3;
            --terra:   #c0622a;
            --terra2:  #e07840;
            --brown:   #3b2a1a;
            --gold:    #d4a853;
            --green:   #4a7c59;
            --text:    #3b2a1a;
            --muted:   #9a8878;
            --white:   #ffffff;
            --shadow:  0 4px 24px rgba(59,42,26,.10);
            --shadow-lg: 0 12px 48px rgba(59,42,26,.16);
            --r: 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(192,98,42,.07) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 100%, rgba(212,168,83,.10) 0%, transparent 55%);
            min-height: 100vh;
            padding: 24px 16px 60px;
            display: flex;
            justify-content: center;
            color: var(--text);
        }

        .page { width: 100%; max-width: 520px; }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 36px 24px 32px;
            background: var(--brown);
            border-radius: 24px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* ── HEADER FOOD STRIP ── */
        .header-food-strip {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .header-food-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid rgba(255,255,255,0.18);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            flex-shrink: 0;
        }
        .header-food-img:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
        }
        /* center image slightly larger */
        .header-food-img.main {
            width: 80px;
            height: 80px;
            border-color: var(--gold);
            border-width: 2.5px;
        }
        /* side images smaller */
        .header-food-img.side {
            width: 52px;
            height: 52px;
            opacity: 0.82;
        }

        .header-icon { font-size: 48px; display: block; margin-bottom: 12px; }
        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--white);
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 900;
            letter-spacing: .5px;
            line-height: 1.2;
        }
        header h1 span { color: var(--gold); }
        .header-sub {
            margin-top: 8px;
            color: rgba(255,255,255,.55);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .header-divider {
            width: 40px; height: 2px;
            background: var(--gold);
            margin: 16px auto 0;
            border-radius: 2px;
        }

        /* ── RICERCA ── */
        .search-wrap { position: relative; margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border: 2px solid var(--warm);
            border-radius: var(--r);
            font-family: inherit;
            font-size: 15px;
            background: var(--white);
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-input:focus { border-color: var(--terra); box-shadow: 0 0 0 4px rgba(192,98,42,.10); }
        .search-icon {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: var(--muted); pointer-events: none;
        }
        #search-results {
            position: absolute; top: calc(100% + 6px); left: 0; width: 100%;
            background: var(--white); border-radius: var(--r);
            box-shadow: var(--shadow-lg); z-index: 200;
            display: none; overflow: hidden;
            border: 1px solid var(--warm);
        }
        .s-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 18px; cursor: pointer;
            border-bottom: 1px solid var(--cream);
            transition: background .15s;
        }
        .s-item:last-child { border-bottom: none; }
        .s-item:hover { background: var(--cream); }
        .s-item img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; background: var(--warm); }
        .s-item-name { font-weight: 600; font-size: 14px; }
        .s-item-cat { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* ── CATEGORIE ── */
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
        .cat-btn {
            border: 2px solid var(--warm);
            background: var(--white);
            border-radius: 20px;
            padding: 28px 16px;
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            transition: all .25s ease;
            box-shadow: var(--shadow);
        }
        .cat-btn:hover {
            border-color: var(--terra);
            background: var(--terra);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .cat-btn:hover .cat-label { color: var(--white); }
        .cat-btn:hover .cat-emoji { transform: scale(1.15) rotate(-5deg); }
        .cat-emoji { font-size: 38px; transition: transform .3s ease; display: block; }
        .cat-label { font-weight: 700; font-size: 13px; color: var(--brown); letter-spacing: .5px; text-transform: uppercase; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(30,18,8,.65);
            backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center;
            z-index: 500; padding: 20px;
        }
        .modal {
            background: var(--white);
            border-radius: 24px;
            width: 100%; max-width: 420px;
            max-height: 80vh; overflow-y: auto;
            padding: 28px 24px;
            box-shadow: var(--shadow-lg);
            animation: slideUp .3s ease;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px; font-weight: 700;
            color: var(--brown);
            border-bottom: 2px solid var(--warm);
            padding-bottom: 14px; margin-bottom: 16px;
        }
        .modal-close-btn {
            float: right; background: var(--warm); border: none;
            border-radius: 50%; width: 32px; height: 32px;
            cursor: pointer; font-size: 16px; color: var(--brown);
            display: flex; align-items: center; justify-content: center;
        }
        .r-link {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 12px; border-radius: 14px;
            cursor: pointer; transition: all .2s;
            border: 1px solid transparent;
            margin-bottom: 6px;
        }
        .r-link:hover { background: var(--cream); border-color: var(--warm); }
        .r-link img { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; background: var(--warm); flex-shrink: 0; }
        .r-link-name { font-weight: 600; font-size: 15px; color: var(--brown); }
        .r-link-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

        /* ── CALCOLATORE ── */
        #calculator-ui {
            display: none;
            animation: fadeIn .4s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .recipe-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border: 1px solid var(--warm);
        }
        .recipe-hero {
            width: 100%; height: 200px;
            object-fit: cover;
            background: var(--warm);
            display: block;
        }
        .recipe-card-body { padding: 20px 22px; }
        .recipe-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--terra); color: var(--white);
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; padding: 5px 12px;
            border-radius: 30px; margin-bottom: 14px;
        }
        .recipe-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 700;
            color: var(--brown); margin-bottom: 6px;
        }
        .recipe-note {
            font-size: 13px; color: var(--muted);
            line-height: 1.6; margin-bottom: 0;
            padding: 12px 14px;
            background: var(--cream); border-radius: 10px;
            border-left: 3px solid var(--gold);
            margin-top: 10px;
            display: none;
        }
        .recipe-note.visible { display: block; }

        /* Form */
        .form-group { margin-bottom: 16px; }
        label.field-label {
            display: block; font-weight: 600; font-size: 13px;
            color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
            margin-bottom: 8px;
        }
        .field-input {
            width: 100%; padding: 14px 18px;
            border: 2px solid var(--warm); border-radius: var(--r);
            font-family: inherit; font-size: 16px; color: var(--text);
            background: var(--white); outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .field-input:focus { border-color: var(--terra); box-shadow: 0 0 0 4px rgba(192,98,42,.10); }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-calc {
            width: 100%; padding: 18px;
            background: var(--terra); color: var(--white);
            border: none; border-radius: var(--r);
            font-family: inherit; font-size: 16px; font-weight: 700;
            cursor: pointer; letter-spacing: .5px; text-transform: uppercase;
            box-shadow: 0 6px 0 #8b3e16;
            transition: transform .15s, box-shadow .15s;
            margin-top: 8px;
        }
        .btn-calc:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b3e16; }
        .btn-calc:hover { background: var(--terra2); }

        /* ── RISULTATO ── */
        #risultato { display: none; animation: fadeIn .4s ease; }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px; color: var(--brown);
            margin-bottom: 14px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }

        .ing-card {
            background: var(--white); border: 1px solid var(--warm);
            border-radius: var(--r); overflow: hidden;
            box-shadow: var(--shadow); margin-bottom: 16px;
        }
        .ing-header {
            background: var(--brown); padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .ing-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--white); font-size: 17px;
        }
        .ing-qty-badge {
            background: var(--gold); color: var(--brown);
            font-size: 12px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
        }
        .ing-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 11px 20px; border-bottom: 1px solid var(--cream);
            font-size: 15px;
        }
        .ing-row:last-child { border-bottom: none; }
        .ing-row:nth-child(even) { background: rgba(249,244,236,.5); }
        .ing-row-total { background: var(--warm) !important; border-top: 2px solid var(--gold); }
        .ing-name { color: var(--text); }
        .ing-val { font-weight: 700; color: var(--terra); font-size: 16px; }

        /* Tangzhong / Salamoia card */
        .extra-card {
            border-radius: var(--r); padding: 18px 20px;
            margin-bottom: 16px; border: 1px solid var(--warm);
            box-shadow: var(--shadow);
        }
        .extra-card.tangzhong { background: #fffbf0; border-left: 4px solid var(--gold); }
        .extra-card.salamoia { background: #f0f6ff; border-left: 4px solid #5b8dd9; }
        .extra-card h4 { font-family: 'Playfair Display', serif; font-size: 15px; margin-bottom: 12px; }

        /* Procedimento */
        .proc-card {
            background: var(--white); border: 1px solid var(--warm);
            border-radius: var(--r); padding: 22px;
            box-shadow: var(--shadow); margin-bottom: 16px;
        }
        .step {
            display: flex; gap: 14px; margin-bottom: 14px;
            font-size: 14px; line-height: 1.65; color: var(--text);
        }
        .step:last-child { margin-bottom: 0; }
        .step-num {
            min-width: 28px; height: 28px;
            background: var(--terra); color: var(--white);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
        }

        /* Staglio dinamico badge */
        .staglio-banner {
            background: linear-gradient(135deg, var(--terra), #a04820);
            color: var(--white);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 10px;
            font-size: 13.5px;
            line-height: 1.55;
        }
        .staglio-banner strong { color: #ffe8b0; }

        /* Azioni risultato */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .btn-action {
            padding: 14px; border-radius: var(--r); border: 2px solid var(--warm);
            background: var(--white); font-family: inherit; font-size: 13px;
            font-weight: 700; cursor: pointer; color: var(--brown);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all .2s;
        }
        .btn-action:hover { border-color: var(--terra); color: var(--terra); background: #fff7f3; }
        .btn-action.primary { background: var(--green); color: var(--white); border-color: var(--green); }
        .btn-action.primary:hover { background: #3a6447; border-color: #3a6447; color: var(--white); }

        /* ── TEMPI BADGE ── */
        .tempi-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-top: 8px;
        }
        .tempo-chip {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 600; padding: 4px 10px;
            border-radius: 20px; white-space: nowrap;
        }
        .tempo-chip.attivo { background: #fff0e6; color: var(--terra); border: 1px solid #f5cdb4; }
        .tempo-chip.totale { background: #edf7f1; color: var(--green); border: 1px solid #b5ddc4; }
        .tempo-chip.note   { background: var(--cream); color: var(--muted); border: 1px solid var(--warm); font-weight: 400; font-style: italic; }

        /* modal tempi */
        .r-link-tempi { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
        .r-link-tempi .tempo-chip { font-size: 10px; padding: 3px 8px; }

        /* ── PRO SKILLS / PROBLEMI ── */
        .extra-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .btn-extra {
            padding: 14px 12px; border-radius: var(--r); border: none;
            font-family: inherit; font-size: 13px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 7px; transition: all .2s; letter-spacing: .2px;
        }
        .btn-extra.pro { background: var(--gold); color: var(--brown); }
        .btn-extra.pro:hover { background: #c4973d; }
        .btn-extra.problems { background: var(--terra); color: var(--white); }
        .btn-extra.problems:hover { background: var(--terra2); }

        .info-modal {
            background: var(--white); border-radius: 24px;
            width: 100%; max-width: 460px;
            max-height: 85vh; overflow-y: auto;
            padding: 28px 24px;
            box-shadow: var(--shadow-lg);
            animation: slideUp .3s ease;
        }
        .info-modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px; font-weight: 700; color: var(--brown);
            border-bottom: 2px solid var(--warm);
            padding-bottom: 14px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .skill-item {
            margin-bottom: 18px;
            background: var(--cream); border-radius: 14px;
            padding: 16px 18px;
            border-left: 4px solid var(--gold);
        }
        .skill-item h4 { font-size: 14px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
        .skill-item p { font-size: 13px; line-height: 1.7; color: var(--text); }
        .problem-item {
            margin-bottom: 18px;
            background: #fff7f3; border-radius: 14px;
            padding: 16px 18px;
            border-left: 4px solid var(--terra);
        }
        .problem-item h4 { font-size: 14px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
        .problem-causa { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
        .problem-causa strong { color: var(--terra); font-style: normal; }
        .problem-sol { font-size: 13px; line-height: 1.7; color: var(--text); }

        /* ── PRINT ── */
        @media print {
            body { background: white; padding: 0; }
            header, .search-wrap, .cat-grid, #calculator-ui, .action-row { display: none !important; }
            #risultato { display: block !important; }
            .ing-card, .extra-card, .proc-card { box-shadow: none; break-inside: avoid; }
            .btn-action { display: none; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- HEADER -->
    <header>
        <div class="header-food-strip">

            passaggi: [
                "<strong>Lessate le patate:</strong> Pesa e lessa {{Patate (sbucciate e schiacciate)}} g di patate sbucciate in acqua salata fino a che risultano morbidissime (prova con uno stecchino: deve entrare senza resistenza). Scolale e schiacciale ancora calde con uno schiaccipatate. Stendile su un vassoio e lasciale raffreddare completamente — le patate calde attiverebbero troppo il lievito e rovinerebbero l'impasto.",
                "<strong>Metti tutto in planetaria:</strong> Nella ciotola della planetaria con il gancio, versa {{Semola rimacinata}} g di semola rimacinata e {{Farina 0}} g di farina 0. Aggiungi le patate schiacciate fredde e {{Olio EVO}} g di olio EVO. Sbriciolaci dentro {{Lievito di birra fresco}} g di lievito fresco. Avvia a velocità minima e comincia ad aggiungere {{Acqua}} g di acqua tiepida (28-30°C) poco alla volta.",
                "<strong>Aggiungi il sale e incorda:</strong> Dopo circa <strong>5 minuti</strong> di lavorazione, quando l'impasto è già formato, aggiungi {{Sale}} g di sale (mai a contatto diretto con il lievito all'inizio). Aumenta la velocità a medio-bassa e impasta per altri <strong>8-10 minuti</strong>. L'impasto sarà morbido e leggermente appiccicoso — è normale per via delle patate. Non aggiungere farina extra.",

                "<strong>Stesura in teglia:</strong> Versa abbondante olio EVO sul fondo di una teglia rotonda (ø 32-36 cm) o rettangolare. Rovescia l'impasto lievitato nella teglia e comincia a stenderlo con le mani unte di olio. Se resiste e si ritira, copri con un canovaccio e aspetta <strong>10 minuti</strong>: il glutine si rilasserà da solo. Stendi fino ai bordi della teglia.",
                "<strong>Seconda lievitazione e condimento:</strong> Copri la teglia e lascia riposare ancora <strong>30 minuti</strong>. Nel frattempo, taglia i pomodorini a metà. Preriscalda il forno a <strong>220-230°C statico</strong> (o 200°C ventilato) con la griglia sul ripiano più basso. Premi i pomodorini nell'impasto con il taglio verso l'alto, aggiungi le olive denocciolate, origano, sale grosso e irrora generosamente con olio EVO.",
                "<strong>Cottura:</strong> Inforna sul ripiano basso e cuoci per <strong>25-35 minuti</strong>. La focaccia è pronta quando il bordo e il fondo sono ben dorati e croccanti. Solleva un angolo con una spatola per controllare: il fondo deve essere ambrato. Sforna e lascia riposare <strong>5 minuti</strong> prima di tagliare."

                { titolo: "🫙 Semola + Farina 0: il Connubio Perfetto", testo: "La semola di grano duro regala alla focaccia barese il suo sapore caratteristico e la croccantezza del fondo. La farina 0 porta il glutine necessario per dare struttura. Non sostituire la semola con farina normale: il risultato sarebbe una focaccia completamente diversa." },

            passaggi: [
                "<strong>Scelta della farina (fondamentale):</strong> Per la pizza in pala con 80% di idratazione è indispensabile una farina forte con W300 o superiore (Caputo Nuvola, Garofalo W330, Lo Conte Pizza...). Una farina debole (W200 o meno, come molte farine '00' da supermercato) non regge tanta acqua e l'impasto collasserà. Controlla sempre il valore W sull'etichetta.",
                "<strong>Autolisi:</strong> Versa {{Acqua}} g di acqua fredda di frigo (3-4°C) in una ciotola grande. Scioglie dentro {{Lievito di birra fresco}} g di lievito sbriciolato e {{Malto diastasico}} g di malto diastasico. Mescola bene. Aggiungi {{Farina (W300+)}} g di farina tutta in una volta e mescola solo fino a che non rimane farina asciutta — <em>non impastare</em>. Copri con pellicola e lascia riposare <strong>30-60 minuti</strong>. Questo riposo (autolisi) permette al glutine di svilupparsi spontaneamente e renderà l'impasto molto più facile da lavorare.",
                "<strong>Strutturazione dell'impasto:</strong> Riprendi il pre-impasto. Aggiungi {{Sale}} g di sale e avvia l'impastatrice con il gancio a velocità medio-bassa. Quando il sale è assorbito, inizia ad aggiungere {{Olio EVO}} g di olio a filo. Impasta per <strong>8-10 minuti</strong> a velocità media. L'impasto è pronto quando si stacca dalle pareti e appare liscio e setoso. <em>⚠️ Non superare mai i 27°C: usa un termometro da cucina.</em>",
                "<strong>Pieghe in ciotola:</strong> Lascia riposare l'impasto in ciotola coperta per <strong>15 minuti</strong>. Poi esegui la prima serie di pieghe: bagna le mani, afferra il bordo dell'impasto, tiralo verso l'alto e piegalo al centro. Ruota la ciotola di 90° e ripeti per 4 lati. Questo è 1 ciclo. Fai <strong>3-4 cicli</strong> ogni 20-30 minuti. Le pieghe rinforzano la maglia glutinica senza scaldare l'impasto.",
                "<strong>Puntata in frigo (maturazione):</strong> Dopo l'ultimo ciclo di pieghe, metti l'impasto in un contenitore rettangolare con coperchio ermetico, leggermente unto. Trasferisci in frigo a 4°C per <strong>24-48 ore</strong>. Più a lungo matura (fino a 72h con pochissimo lievito), più sarà digeribile e saporito. Nota: con {{Lievito di birra fresco}} g la maturazione ideale è 24-36h.",
                "<strong>Staglio e appretto:</strong> Estrai il contenitore dal frigo. L'impasto deve essere raddoppiato. Rovescialo delicatamente su un piano cosparso di semola rimacinata (non di farina: la semola non si assorbe e facilita la manipolazione). Taglia i panetti con un tarocco — mai strapparli. Chiudi ogni panetto portando i lembi verso il centro e capovolgi. Metti in contenitori singoli coperti e lascia a temperatura ambiente per <strong>3-4 ore</strong> fino al raddoppio.",
                "<strong>Preriscaldamento forno:</strong> Posiziona la pietra refrattaria o la piastra d'acciaio sul ripiano più basso. Accendi il forno alla massima temperatura (<strong>280-300°C ventilato</strong> o grill+ventilato) e lascia riscaldare per almeno <strong>45-60 minuti</strong>. La pietra deve essere rovente: è il segreto di una base croccante.",
                "<strong>Stesura:</strong> Cospargi di semola rimacinata una pala da pizza (o il retro di una teglia piatta). Rovescia il panetto sulla semola. Con i polpastrelli, schiaccia delicatamente dall'alto verso il basso in forma allungata, spingendo i gas verso i bordi. Usa i pugni chiusi sotto l'impasto per allargarlo ulteriormente. I bordi (cornicione) non devono mai essere toccati. Il disco deve essere sottile al centro.",
                "<strong>Condimento e cottura:</strong> Condisci velocemente con pomodoro San Marzano schiacciato a mano, sale, olio. Fai scivolare la pizza sulla pietra rovente con un movimento deciso. Cuoci per <strong>5-7 minuti</strong>. A metà cottura (circa 3 minuti), estrai e aggiungi la mozzarella ben strizzata. Rimetti in forno fino a che i bordi sono gonfi e scuri. Finisci con basilico fresco e un filo d'olio EVO."

                "<strong>Impasto base (il pastello):</strong> Nella ciotola della planetaria col gancio, unisci {{Farina Manitoba}} g di Manitoba e {{Farina 00}} g di farina 00. Aggiungi {{Latte intero}} g di latte tiepido (28°C), {{Miele}} g di miele, {{Estratto di vaniglia}} g di vaniglia e sbriciolaci direttamente {{Lievito di birra fresco}} g di lievito fresco. Versa anche {{Uova (sgusciate)}} g di uova sbattute. Avvia a velocità bassa.",

                "<strong>Prepara il panetto di burro (per la sfogliatura):</strong> Prendi {{Burro (sfogliatura)}} g di burro freddo da frigo e posizionalo tra due fogli di carta forno. Con il mattarello battilo e stendilo fino a formare un rettangolo di circa 15×20 cm e spessore uniforme di 5-6 mm. Rimettilo in frigo: deve essere freddo ma malleabile, non duro come pietra.",
                "<strong>Primo giro di sfogliatura:</strong> Stendi il pastello freddo in un rettangolo circa il doppio del panetto di burro. Posiziona il burro al centro. Ripiega i lembi dell'impasto sul burro come una busta chiusa, sigillando bene i bordi. Stendi delicatamente col mattarello in un rettangolo lungo. Piega in tre (come una lettera: bordo basso al centro, bordo alto sopra). Avvolgi in pellicola e riponi in frigo <strong>30 minuti</strong>.",
                "<strong>Secondo e terzo giro:</strong> Ripeti l'operazione di stesura e piegatura in tre per altri <strong>2 volte</strong>, sempre con 30 minuti di riposo in frigo tra un giro e l'altro. Totale: 3 giri. Dopo l'ultimo giro lascia riposare in frigo <strong>8-12 ore</strong> (anche tutta la notte).",

                "<strong>Lievitazione finale:</strong> Copri con pellicola leggermente unta. Lascia lievitare a <strong>26-28°C per 2-3 ore</strong>. I cornetti sono pronti quando sono visibilmente gonfi e, premendo delicatamente, la forma torna su lentamente. Non accelerare con temperature più alte: rovinereste la sfogliatura.",

                { titolo: "🧈 Che Burro Usare per la Sfogliatura", testo: "Usa un burro con almeno 82% di grassi (burro tedesco, francese o da centrifuga). I burri da supermercato standard (80% di grassi) contengono più acqua e rendono la sfogliatura meno definita. La differenza nel risultato finale è notevole." },

            passaggi: [
                "<strong>Impasto base in planetaria:</strong> Nella ciotola della planetaria con il gancio, versa {{Farina Manitoba}} g di farina Manitoba. Aggiungi {{Latte intero}} g di latte tiepido (28-30°C) con {{Miele}} g di miele e sbriciolaci direttamente {{Lievito di birra fresco}} g di lievito fresco. Aggiungi {{Uova (sgusciate)}} g di uova sbattute. Avvia a velocità minima (1) per 2 minuti fino ad amalgamare.",

// ── STATO ────────────────────────────────────────────────────────────────────
let catAttiva = "";
let idAttivo  = "";

// ── UTILITY ──────────────────────────────────────────────────────────────────
function getImg(r, cat) {
    return (r.foto && r.foto !== "") ? r.foto : (cat === "SALATI" ? IMG.salato : IMG.dolce);
}

function arrotonda(val, nome) {
    const precisi = ["Lievito di birra fresco","Malto diastasico","Malto/Miele/Zucchero","Miele","Miele d'acacia","Estratto di vaniglia","Sale","Burro (sfogliatura)","Burro (impasto)","Burro (scarpatura)","Vaniglia (semi)","Pasta d'arancia","Amido di mais (glassa)"];
    if (precisi.includes(nome)) return parseFloat(val.toFixed(1));
    return (val - Math.floor(val) >= 0.6) ? Math.ceil(val) : Math.floor(val);
}

// ── RICERCA ───────────────────────────────────────────────────────────────────
function searchRecipes() {
    const q = document.getElementById('mainSearch').value.toLowerCase().trim();
    const box = document.getElementById('search-results');
    box.innerHTML = "";
    if (q.length < 1) { box.style.display = "none"; return; }
    let n = 0;
    for (const cat in RICETTE) {
        for (const id in RICETTE[cat]) {
            const r = RICETTE[cat][id];
            if (r.nome.toLowerCase().includes(q)) {
                const d = document.createElement('div');
                d.className = "s-item";
                d.innerHTML = `<img src="${getImg(r, cat)}" onerror="this.src='${IMG.salato}'">
                    <div><div class="s-item-name">${r.nome}</div><div class="s-item-cat">${cat}</div></div>`;
                d.onclick = () => { catAttiva = cat; selectRecipe(id); document.getElementById('mainSearch').value = ""; box.style.display = "none"; };
                box.appendChild(d); n++;
            }
        }
    }
    box.style.display = n > 0 ? "block" : "none";
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(cat) {
    catAttiva = cat;
    document.getElementById('modalTitle').innerText = cat === 'SALATI' ? "🍕 Impasti Salati" : "🥐 Impasti Dolci";
    const list = document.getElementById('recipeList');
    list.innerHTML = "";
    const ricette = RICETTE[cat];
    if (!ricette || Object.keys(ricette).length === 0) {
        list.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px">Nessuna ricetta disponibile</p>';
    } else {
        Object.keys(ricette).sort().forEach(id => {
            const r = ricette[id];
            const d = document.createElement('div');
            d.className = "r-link";
            d.innerHTML = `<img src="${getImg(r, cat)}" onerror="this.src='${IMG.dolce}'">
                <div style="flex:1">
                    <div class="r-link-name">${r.nome}</div>
                    <div class="r-link-meta">${r.nota ? r.nota.substring(0,55)+'…' : ''}</div>
                    ${r.tempi ? `<div class="r-link-tempi">
                        <span class="tempo-chip attivo">⚡ Attivo: ${r.tempi.attivo}</span>
                        <span class="tempo-chip totale">⏱ Totale: ${r.tempi.totale}</span>
                    </div>` : ''}
                </div>`;
            d.onclick = () => selectRecipe(id);
            list.appendChild(d);
        });
    }
    document.getElementById('modalOverlay').style.display = "flex";
}

function closeModal() { document.getElementById('modalOverlay').style.display = "none"; }

// ── SELEZIONA RICETTA ─────────────────────────────────────────────────────────
function selectRecipe(id) {
    idAttivo = id;
    const r = RICETTE[catAttiva][id];
    document.getElementById('recipe-hero').src = getImg(r, catAttiva);
    document.getElementById('recipe-badge').textContent = catAttiva === 'SALATI' ? '🍕 Salato' : '🥐 Dolce';
    document.getElementById('recipe-title').textContent = r.nome;
    const noteEl = document.getElementById('recipe-note');
    if (r.nota) { noteEl.innerHTML = '📝 ' + r.nota; noteEl.classList.add('visible'); }
    else { noteEl.classList.remove('visible'); }
    // Tempi
    const tempiEl = document.getElementById('recipe-tempi');
    if (r.tempi) {
        tempiEl.innerHTML = `
            <span class="tempo-chip attivo">⚡ Lavoro attivo: ${r.tempi.attivo}</span>
            <span class="tempo-chip totale">⏱ Tempo totale: ${r.tempi.totale}</span>
            ${r.tempi.note ? `<span class="tempo-chip note">ℹ️ ${r.tempi.note}</span>` : ''}`;
        tempiEl.style.display = 'flex';
    } else {
        tempiEl.style.display = 'none';
    }
    document.getElementById('peso-panetto').value = r.pesoDefault;
    document.getElementById('calculator-ui').style.display = "block";
    document.getElementById('risultato').style.display = "none";
    closeModal();
    setTimeout(() => document.getElementById('calculator-ui').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// ── CALCOLA ───────────────────────────────────────────────────────────────────
function calcola() {
    const r = RICETTE[catAttiva][idAttivo];
    if (!r) return;
    const qty = parseInt(document.getElementById('quantita').value) || 1;
    const target = parseFloat(document.getElementById('peso-panetto').value) * qty;
    if (!target || target <= 0) { alert("Inserisci il peso del panetto!"); return; }

    // Calcolo dosi
    let dosi = {};
    if (r.tipo === "percentuale") {
        const sum = Object.values(r.ingredienti).reduce((a, b) => a + b, 0);
        const fBase = target / (sum / 100);
        for (const [k, v] of Object.entries(r.ingredienti)) dosi[k] = (fBase * v) / 100;
    } else {
        // tipo "fissa": se c'è pesoBase usa quello, altrimenti somma gli ingredienti
        const riferimento = r.pesoBase ? r.pesoBase : Object.values(r.ingredienti).reduce((a, b) => a + b, 0);
        const m = target / riferimento;
        for (const [k, v] of Object.entries(r.ingredienti)) dosi[k] = v * m;
    }
    const dosiF = {};
    for (const k in dosi) dosiF[k] = arrotonda(dosi[k], k);

    // ── HTML RISULTATO ──
    // Tempi nel risultato
    let html = '';
    if (r.tempi) {
        html += `<div class="tempi-bar" style="margin-bottom:16px">
            <span class="tempo-chip attivo">⚡ Lavoro attivo: ${r.tempi.attivo}</span>
            <span class="tempo-chip totale">⏱ Tempo totale: ${r.tempi.totale}</span>
            ${r.tempi.note ? `<span class="tempo-chip note">ℹ️ ${r.tempi.note}</span>` : ''}
        </div>`;
    }
    html += `
        <div class="ing-card">
            <div class="ing-header">
                <h3>${r.nome}</h3>
                <span class="ing-qty-badge">${qty} × ${document.getElementById('peso-panetto').value} g</span>
            </div>`;
    for (const [k, v] of Object.entries(dosiF)) {
        html += `<div class="ing-row"><span class="ing-name">${k}</span><span class="ing-val">${v} g</span></div>`;
    }
    const pesoTotale = Object.values(dosiF).reduce((a, b) => a + b, 0);
    html += `<div class="ing-row ing-row-total"><span class="ing-name" style="font-weight:700;color:var(--brown)">⚖️ Peso totale impasto</span><span class="ing-val" style="color:var(--brown);font-size:17px">${Math.round(pesoTotale)} g</span></div>`;
    html += `</div>`;

    // Tangzhong
    if (r.roux) {
        const fKey = Object.keys(r.ingredienti)[0];
        const fRoux = arrotonda(dosi[fKey] * 0.1, "");
        html += `<div class="extra-card tangzhong">
            <h4>🥣 Mung Roux — Tangzhong</h4>
            <div class="ing-row"><span class="ing-name">Farina (dal totale)</span><span class="ing-val">${fRoux} g</span></div>
            <div class="ing-row"><span class="ing-name">Latte (dal totale)</span><span class="ing-val">${fRoux*5} g</span></div>
        </div>`;
    }

    // Salamoia
    if (r.salamoia) {
        html += `<div class="extra-card salamoia"><h4>🌊 Salamoia (per teglia)</h4>`;
        for (const [k, v] of Object.entries(r.salamoia)) {
            const val = typeof v === 'number' ? `${arrotonda(v * qty, "")} g` : v;
            html += `<div class="ing-row"><span class="ing-name">${k}</span><span class="ing-val">${val}</span></div>`;
        }
        html += `</div>`;
    }

    // Procedimento con staglio dinamico
    if (r.passaggi && r.passaggi.length > 0) {
        // Costruisci lista passaggi (eventualmente con staglio iniettato)
        let passaggi = [...r.passaggi];
        const pesoPanetto = parseFloat(document.getElementById('peso-panetto').value);

        if (qty > 1 && r.staglio) {
            const pl    = r.staglio.pezzi || 'panetti';
            const plSing = pl.replace(/i$/, 'o').replace(/e$/, 'a'); // teglie→teglia, pirottini→pirottino
            const banner = `<div class="staglio-banner">✂️ <strong>Staglio — ${qty} ${pl} da ${pesoPanetto} g ciascuno</strong><br>Pesa e dividi l'impasto in <strong>${qty} pezzi uguali da ${pesoPanetto} g</strong> con un tarocco e una bilancia precisa. Non strappare mai l'impasto: taglia netto.</div>`;
            const idx = passaggi.findIndex(s => s.includes(r.staglio.keyword));
            if (idx !== -1) {
                if (r.staglio.new) {
                    // Ricette senza step staglio: inserisci step nuovo prima del passaggio indicato
                    passaggi.splice(idx, 0, banner);
                } else {
                    // Ricette con step staglio già presente: aggiungi il banner in cima allo step
                    passaggi[idx] = banner + passaggi[idx];
                }
            }
        }

        html += `<div class="proc-card">
            <div class="section-title">📋 Procedimento</div>`;
        let stepN = 0;
        passaggi.forEach((step) => {
            // Se lo step è solo un banner staglio (non ha <strong>), non incrementare il numero
            const isBannerOnly = step.startsWith('<div class="staglio-banner">') && !step.includes('</div><strong>');
            if (!isBannerOnly) stepN++;
            const stepDin = step.replace(/\{\{(.*?)\}\}/g, (m, p) =>
                `<strong style="color:var(--terra)">${dosiF[p] || p}</strong>`);
            if (isBannerOnly) {
                // Banner standalone (ricette senza staglio pre-esistente): niente numero cerchiato
                html += `<div class="step"><div style="min-width:28px"></div><div style="flex:1">${stepDin}</div></div>`;
            } else {
                html += `<div class="step"><div class="step-num">${stepN}</div><div>${stepDin}</div></div>`;
            }
        });
        html += `</div>`;
    }

    // Pulsanti Pro Skills / Risoluzione Problemi
    if (r.proSkills || r.problemi) {
        html += `<div class="extra-btns">`;
        if (r.proSkills) html += `<button class="btn-extra pro" onclick="openProModal()">💡 Pro Skills</button>`;
        if (r.problemi)  html += `<button class="btn-extra problems" onclick="openProblemModal()">🔧 Risoluzione Problemi</button>`;
        html += `</div>`;
    }

    // Azioni
    html += `<div class="action-row">
        <button class="btn-action" onclick="stampaPDF()">🖨️ Stampa / PDF</button>
        <button class="btn-action primary" onclick="scaricaTesto()">💾 Salva ricetta</button>
    </div>`;

    const res = document.getElementById('risultato');
    res.innerHTML = html;
    res.style.display = 'block';
    setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// ── MODAL INFO ────────────────────────────────────────────────────────────────
function openProModal() {
    const r = RICETTE[catAttiva][idAttivo];
    if (!r || !r.proSkills) return;
    let html = '';
    r.proSkills.forEach(s => {
        html += `<div class="skill-item"><h4>${s.titolo}</h4><p>${s.testo}</p></div>`;
    });
    document.getElementById('proModalBody').innerHTML = html;
    document.getElementById('proModal').style.display = 'flex';
}

function openProblemModal() {
    const r = RICETTE[catAttiva][idAttivo];
    if (!r || !r.problemi) return;
    let html = '';
    r.problemi.forEach(p => {
        html += `<div class="problem-item">
            <h4>${p.titolo}</h4>
            <div class="problem-causa"><strong>Causa:</strong> ${p.causa}</div>
            <div class="problem-sol"><strong>Soluzione:</strong> ${p.soluzione}</div>
        </div>`;
    });
    document.getElementById('problemModalBody').innerHTML = html;
    document.getElementById('problemModal').style.display = 'flex';
}

function closeInfoModal(id) { document.getElementById(id).style.display = 'none'; }

// ── AZIONI ────────────────────────────────────────────────────────────────────
function stampaPDF() { window.print(); }

function scaricaTesto() {
    const r = RICETTE[catAttiva][idAttivo];
    if (!r) return;
    const qty = parseInt(document.getElementById('quantita').value) || 1;
    const pesoPanetto = parseFloat(document.getElementById('peso-panetto').value);
    const target = pesoPanetto * qty;

    let dosi = {};
    if (r.tipo === "percentuale") {
        const sum = Object.values(r.ingredienti).reduce((a,b)=>a+b,0);
        const fBase = target/(sum/100);
        for(const [k,v] of Object.entries(r.ingredienti)) dosi[k]=arrotonda((fBase*v)/100,k);
    } else {
        const riferimento = r.pesoBase ? r.pesoBase : Object.values(r.ingredienti).reduce((a,b)=>a+b,0);
        const m = target / riferimento;
        for(const [k,v] of Object.entries(r.ingredienti)) dosi[k]=arrotonda(v*m,k);
    }

    let testo = `ROBELLA BAKERY — ${r.nome.toUpperCase()}\n`;
    testo += `${'='.repeat(40)}\n`;
    testo += `Quantità: ${qty} panetti da ${pesoPanetto} g\n\n`;
    testo += `INGREDIENTI\n${'-'.repeat(30)}\n`;
    for (const [k,v] of Object.entries(dosi)) testo += `${k}: ${v} g\n`;

    if (r.passaggi && r.passaggi.length > 0) {
        testo += `\nPROCEDIMENTO\n${'-'.repeat(30)}\n`;
        r.passaggi.forEach((step,i) => {
            // Sostituisci i placeholder {{}} con i valori calcolati
            let stepConDosi = step.replace(/\{\{(.*?)\}\}/g, (m, p) => `${dosi[p] || p}`);
            // Rimuovi i tag HTML
            const pulito = stepConDosi.replace(/<[^>]+>/g,'');
            testo += `${i+1}. ${pulito}\n\n`;
        });
    }
    testo += `\n— Generato da Robella Bakery Calculator —`;

    const blob = new Blob([testo], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `${r.nome.replace(/\s+/g,'-').toLowerCase()}_x${qty}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

// Chiudi ricerca cliccando fuori
document.addEventListener('click', e => {
    const box = document.getElementById('search-results');
    if (!e.target.closest('.search-wrap')) box.style.display = 'none';
});
</script>
