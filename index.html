<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robella Bakery - Calcolatore Professionale</title>
    <style>
        /* --- STILE PROFESSIONALE "ROBELLA BAKERY" --- */
        :root {
            --primary-color: #e67e22; /* Arancione Crosta */
            --secondary-color: #2c3e50; /* Blu Scuro Testo */
            --accent-color: #f1c40f; /* Giallo Oro */
            --success-color: #27ae60; /* Verde Tasto */
            --bg-color: #fdfcfb; /* Crema chiarissimo */
            --text-color: #34495e;
            --border-radius: 12px;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding: 20px; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
        }

        .container { 
            background-color: #fff; 
            padding: 30px; 
            border-radius: var(--border-radius); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 480px; 
            width: 100%; 
            border: 1px solid #f1f1f1;
        }

        /* Header e Logo */
        .header-logo {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
        }

        h1 { 
            color: var(--primary-color); 
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--secondary-color);
            font-size: 14px;
            margin-top: 5px;
            font-weight: 400;
            opacity: 0.8;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 20px;
        }

        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 8px; 
            color: var(--secondary-color);
            font-size: 15px;
        }

        select, input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #eaeaea; 
            border-radius: var(--border-radius); 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: all 0.2s;
            background-color: #fff;
            color: var(--text-color);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        /* Button */
        button { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--success-color); 
            color: white; 
            border: none; 
            border-radius: var(--border-radius); 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 5px 0 #1e8449; 
            transition: all 0.1s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #2ecc71;
        }

        button:active { 
            transform: translateY(3px); 
            box-shadow: 0 2px 0 #1e8449; 
        }

        /* Risultati */
        #risultato { 
            margin-top: 35px; 
            padding: 20px; 
            background-color: #fff; 
            border: 1px solid #eee;
            border-radius: var(--border-radius); 
            display: none; 
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 {
            text-align: center;
            color: var(--secondary-color);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .ingrediente { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 12px 5px; 
            border-bottom: 1px solid #f9f9f9; 
        }

        .ingrediente:last-of-type {
            border-bottom: 2px solid #eee;
        }

        .ingrediente span {
            color: var(--text-color);
            font-size: 16px;
        }

        .ingrediente strong {
            color: var(--secondary-color);
            font-size: 18px;
            font-weight: 700;
        }

        /* Box Riepilogo e Speciali */
        .info-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #f8f9fa; 
            border-radius: 8px; 
            font-size: 14px; 
            color: var(--secondary-color);
            text-align: center;
            border: 1px solid #eee;
        }

        .extra-box { 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 14px; 
            border-left: 5px solid var(--accent-color); 
            background-color: #fef9e7; 
            color: #7d6608; 
            line-height: 1.5;
        }

        .roux-icon::before { content: "🥣 "; }
        .salamoia-icon::before { content: "🌊 "; }

    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <h1>Robella Bakery</h1>
        <div class="subtitle">Calcolatore Impasti Artigianali</div>
    </div>

    <div class="form-group">
        <label for="prodotto">Cosa vuoi preparare?</label>
        <select id="prodotto" onchange="aggiornaPesoDefault()"></select>
    </div>

    <div class="form-group">
        <label for="peso-panetto">Peso teorico del panetto (gr):</label>
        <input type="number" id="peso-panetto" min="1">
    </div>

    <div class="form-group">
        <label for="quantita">Quanti panetti/pezzi vuoi fare?</label>
        <input type="number" id="quantita" min="1" value="1">
    </div>

    <button onclick="calcola()">Calcola Ingredienti</button>

    <div id="risultato"></div>
</div>

<script>
    /* ==========================================
       ARCHIVIO RICETTE - IMMUTATO
       ========================================== */
    const ARCHIVIO_RICETTE = {
        "teglia": {
            nome: "Pizza in Teglia",
            pesoDefault: 620,
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina": 100, "Acqua": 80, "Lievito di birra fresco": 0.65, "Malto diastasico": 0.3, "Sale": 2.6, "Olio EVO": 2.5 }
        },
        "pala": {
            nome: "Pizza in Pala",
            pesoDefault: 350,
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina": 100, "Acqua": 80, "Lievito di birra fresco": 0.65, "Malto diastasico": 0.3, "Sale": 2.6, "Olio EVO": 2.5 }
        },
        "tonda": {
            nome: "Pizza Tonda",
            pesoDefault: 250,
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina": 100, "Acqua": 70, "Lievito di birra fresco": 0.5, "Malto diastasico": 0.3, "Sale": 2 }
        },
        "focaccia": {
            nome: "Focaccia Barese",
            pesoDefault: 675,
            tipoCalcolo: "fissa",
            ingredienti: { "Semola": 450, "Farina 0": 150, "Acqua": 400, "Patate bollite": 290, "Olio EVO": 20, "Sale": 18, "Lievito di birra fresco": 12.5 }
        },
        "genovese": {
            nome: "Focaccia Genovese",
            pesoDefault: 673,
            tipoCalcolo: "fissa",
            ingredienti: { "Farina tipo 1 o 0": 400, "Acqua tiepida": 220, "Lievito di birra fresco": 8, "Sale": 10, "Olio EVO": 15, "Strutto": 15, "Malto/Miele/Zucchero": 5 },
            salamoia: { acqua: 50, olio: 25, sale: 4 }
        },
        "burger": {
            nome: "Bun per Hamburger",
            pesoDefault: 80,
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina (Manitoba)": 100, "Latte intero": 60, "Lievito di birra fresco": 4, "Zucchero": 10, "Burro": 10, "Sale": 2, "Uova (sgusciate)": 13.6 },
            roux: true
        }
    };

    // --- MOTORE DI CALCOLO - IMMUTATO ---

    const selectProdotto = document.getElementById('prodotto');
    
    function inizializzaApp() {
        for (const [id, dati] of Object.entries(ARCHIVIO_RICETTE)) {
            let opt = document.createElement('option');
            opt.value = id;
            opt.innerHTML = dati.nome;
            selectProdotto.appendChild(opt);
        }
        aggiornaPesoDefault();
    }

    function aggiornaPesoDefault() {
        const id = selectProdotto.value;
        document.getElementById('peso-panetto').value = ARCHIVIO_RICETTE[id].pesoDefault;
    }

    function arrotonda(val, nome) {
        if (["Lievito di birra fresco", "Malto diastasico", "Malto/Miele/Zucchero"].includes(nome)) return parseFloat(val.toFixed(2));
        return (val - Math.floor(val) >= 0.6) ? Math.ceil(val) : Math.floor(val);
    }

    function calcola() {
        const id = selectProdotto.value;
        const ricetta = ARCHIVIO_RICETTE[id];
        const quantita = parseInt(document.getElementById('quantita').value);
        const pesoTarget = parseFloat(document.getElementById('peso-panetto').value) * quantita;

        if (isNaN(quantita) || quantita < 1 || isNaN(pesoTarget)) {
            alert("Inserisci valori validi.");
            return;
        }

        let dosiTeoriche = {};
        
        if (ricetta.tipoCalcolo === "percentuale") {
            const sommaPercentuali = Object.values(ricetta.ingredienti).reduce((a, b) => a + b, 0);
            const farinaBase = pesoTarget / (sommaPercentuali / 100);
            for (const [ing, perc] of Object.entries(ricetta.ingredienti)) {
                dosiTeoriche[ing] = (farinaBase * perc) / 100;
            }
        } else {
            const pesoRicettaBase = Object.values(ricetta.ingredienti).reduce((a, b) => a + b, 0);
            const moltiplicatore = pesoTarget / pesoRicettaBase;
            for (const [ing, q] of Object.entries(ricetta.ingredienti)) {
                dosiTeoriche[ing] = q * moltiplicatore;
            }
        }

        let outputHtml = `<h3>Dosi per ${quantita} ${ricetta.nome}:</h3>`;
        let pesoEffettivo = 0;

        for (const [ing, q] of Object.entries(dosiTeoriche)) {
            const finale = arrotonda(q, ing);
            pesoEffettivo += finale;
            outputHtml += `<div class="ingrediente"><span>${ing}</span><strong>${finale} gr</strong></div>`;
        }

        outputHtml += `<div class="info-box">Peso totale: <b>${pesoEffettivo}g</b> | Panetto reale: <b>${(pesoEffettivo/quantita).toFixed(1)}g</b></div>`;

        if (ricetta.roux) {
            const fRoux = arrotonda(dosiTeoriche["Farina (Manitoba)"] * 0.1, "");
            outputHtml += `<div class="extra-box roux-icon"><b>Thangzhong:</b> Prendi ${fRoux}g di farina e ${fRoux*5}g di latte dal TOTALE pesato sopra. Scalda finché non addensa, usa da freddo.</div>`;
        }
        if (ricetta.salamoia) {
            outputHtml += `<div class="extra-box salamoia-icon" style="background-color:#e1f5fe; border-left-color:#03a9f4; color:#01579b;">
                <b>Salamoia:</b> Mescola ${ricetta.salamoia.acqua*quantita}ml Acqua, ${ricetta.salamoia.olio*quantita}ml Olio, ${ricetta.salamoia.sale*quantita}g Sale. Qualche chicco di sale grosso.</div>`;
        }

        const resDiv = document.getElementById('risultato');
        resDiv.innerHTML = outputHtml;
        resDiv.style.display = 'block';
        
        // Scroll automatico ai risultati su mobile
        resDiv.scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = inizializzaApp;
</script>
</body>
</html>
