<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Impasti - Cloud</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h1 { text-align: center; color: #e67e22; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #2c3e50; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 0 #1e8449; transition: all 0.2s; }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #1e8449; }
        #risultato { margin-top: 25px; padding: 15px; background-color: #fff; border: 2px solid #ecf0f1; border-radius: 10px; display: none; }
        .ingrediente { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .ingrediente:last-child { border-bottom: none; }
        .info-box { margin-top: 15px; padding: 12px; background-color: #e8f8f5; border-left: 5px solid #27ae60; border-radius: 4px; font-size: 14px; }
        .extra-box { margin-top: 15px; padding: 12px; border-radius: 4px; font-size: 14px; border-left: 5px solid #f1c40f; background-color: #fef9e7; color: #7d6608; }
    </style>
</head>
<body>

<div class="container">
    <h1>Laboratorio Impasti</h1>

    <label for="prodotto">Cosa vuoi preparare?</label>
    <select id="prodotto" onchange="aggiornaPesoDefault()"></select>

    <label for="peso-panetto">Peso teorico del panetto (gr):</label>
    <input type="number" id="peso-panetto" min="1">

    <label for="quantita">Quanti panetti/pezzi vuoi fare?</label>
    <input type="number" id="quantita" min="1" value="1">

    <button onclick="calcola()">Calcola Ingredienti</button>

    <div id="risultato"></div>
</div>

<script>
    /* ==========================================
       ARCHIVIO RICETTE - AGGIUNGI QUI LE NUOVE
       ========================================== */
    const ARCHIVIO_RICETTE = {
        "teglia": {
            nome: "Pizza in Teglia",
            pesoDefault: 620, // Aggiornato
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina": 100, "Acqua": 80, "Lievito di birra fresco": 0.65, "Malto diastasico": 0.3, "Sale": 2.6, "Olio EVO": 2.5 }
        },
        "pala": {
            nome: "Pizza in Pala",
            pesoDefault: 350,
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina": 100, "Acqua": 80, "Lievito di birra fresco": 0.65, "Malto diastasico": 0.3, "Sale": 2.6, "Olio EVO": 2.5 }
        },
        "tonda": {
            nome: "Pizza Tonda",
            pesoDefault: 250,
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina": 100, "Acqua": 70, "Lievito di birra fresco": 0.5, "Malto diastasico": 0.3, "Sale": 2 }
        },
        "focaccia": {
            nome: "Focaccia Barese",
            pesoDefault: 675,
            tipoCalcolo: "fissa",
            ingredienti: { "Semola": 450, "Farina 0": 150, "Acqua": 400, "Patate bollite": 290, "Olio EVO": 20, "Sale": 18, "Lievito di birra fresco": 12.5 }
        },
        "genovese": {
            nome: "Focaccia Genovese",
            pesoDefault: 673, // Aggiornato (somma esatta ingredienti)
            tipoCalcolo: "fissa",
            ingredienti: { "Farina tipo 1 o 0": 400, "Acqua tiepida": 220, "Lievito di birra fresco": 8, "Sale": 10, "Olio EVO": 15, "Strutto": 15, "Malto/Miele/Zucchero": 5 },
            salamoia: { acqua: 50, olio: 25, sale: 4, "Qualche chicco di sale grosso in superficie" }
        },
        "burger": {
            nome: "Bun per Hamburger",
            pesoDefault: 80, // Aggiornato
            tipoCalcolo: "percentuale",
            ingredienti: { "Farina (Manitoba)": 100, "Latte intero": 60, "Lievito di birra fresco": 4, "Zucchero": 10, "Burro": 10, "Sale": 2, "Uova (sgusciate)": 13.6 },
            roux: true
        }
    };

    // --- MOTORE DI CALCOLO ---

    const selectProdotto = document.getElementById('prodotto');
    
    function inizializzaApp() {
        for (const [id, dati] of Object.entries(ARCHIVIO_RICETTE)) {
            let opt = document.createElement('option');
            opt.value = id;
            opt.innerHTML = dati.nome;
            selectProdotto.appendChild(opt);
        }
        aggiornaPesoDefault();
    }

    function aggiornaPesoDefault() {
        const id = selectProdotto.value;
        document.getElementById('peso-panetto').value = ARCHIVIO_RICETTE[id].pesoDefault;
    }

    function arrotonda(val, nome) {
        if (["Lievito di birra fresco", "Malto diastasico", "Malto/Miele/Zucchero"].includes(nome)) return parseFloat(val.toFixed(2));
        return (val - Math.floor(val) >= 0.6) ? Math.ceil(val) : Math.floor(val);
    }

    function calcola() {
        const id = selectProdotto.value;
        const ricetta = ARCHIVIO_RICETTE[id];
        const quantita = parseInt(document.getElementById('quantita').value);
        const pesoTarget = parseFloat(document.getElementById('peso-panetto').value) * quantita;

        let dosiTeoriche = {};
        
        if (ricetta.tipoCalcolo === "percentuale") {
            const sommaPercentuali = Object.values(ricetta.ingredienti).reduce((a, b) => a + b, 0);
            const farinaBase = pesoTarget / (sommaPercentuali / 100);
            for (const [ing, perc] of Object.entries(ricetta.ingredienti)) {
                dosiTeoriche[ing] = (farinaBase * perc) / 100;
            }
        } else {
            const pesoRicettaBase = Object.values(ricetta.ingredienti).reduce((a, b) => a + b, 0);
            const moltiplicatore = pesoTarget / pesoRicettaBase;
            for (const [ing, q] of Object.entries(ricetta.ingredienti)) {
                dosiTeoriche[ing] = q * moltiplicatore;
            }
        }

        let outputHtml = `<h3>Dosi per ${quantita} ${ricetta.nome}:</h3>`;
        let pesoEffettivo = 0;

        for (const [ing, q] of Object.entries(dosiTeoriche)) {
            const finale = arrotonda(q, ing);
            pesoEffettivo += finale;
            outputHtml += `<div class="ingrediente"><span>${ing}</span><strong>${finale} gr</strong></div>`;
        }

        outputHtml += `<div class="info-box">Peso totale: <b>${pesoEffettivo}g</b> | Panetto reale: <b>${(pesoEffettivo/quantita).toFixed(1)}g</b></div>`;

        if (ricetta.roux) {
            const fRoux = arrotonda(dosiTeoriche["Farina (Manitoba)"] * 0.1, "");
            outputHtml += `<div class="extra-box"><b>Thangzhong:</b> Usa ${fRoux}g di farina e ${fRoux*5}g di latte dal totale pesato.</div>`;
        }
        if (ricetta.salamoia) {
            outputHtml += `<div class="extra-box" style="background-color:#e1f5fe; border-left-color:#03a9f4; color:#01579b;">
                <b>Salamoia:</b> ${ricetta.salamoia.acqua*quantita}ml Acqua, ${ricetta.salamoia.olio*quantita}ml Olio, ${ricetta.salamoia.sale*quantita}g Sale.</div>`;
        }

        const resDiv = document.getElementById('risultato');
        resDiv.innerHTML = outputHtml;
        resDiv.style.display = 'block';
    }

    window.onload = inizializzaApp;
</script>
</body>

</html>
